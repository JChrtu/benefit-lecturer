<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปสวัสดิการพนักงานสายวิชาการ 2569</title>
    <link rel="icon" href="https://quota.jc.tu.ac.th/images/jc_logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f1f5f9;
        }
        .welfare-card {
            transition: all 0.3s ease;
        }
        .welfare-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .condition-list {
            list-style-type: none;
            padding-left: 0;
        }
        .condition-list li::before {
            content: "•";
            color: #ef4444;
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>

            <p class="text-xl text-gray-700">มหาวิทยาลัยธรรมศาสตร์ และ คณะวารสารศาสตร์และสื่อสารมวลชน</p>
            <div class="inline-block mt-4 px-4 py-1 bg-white rounded-full text-sm font-medium text-gray-500 shadow-sm">
                อัปเดตข้อมูล: มีนาคม 2569
            </div>
            
            <div class="mt-8 flex flex-wrap justify-center gap-4 no-print" id="action-buttons">

                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>

                    โหลดเป็นรูปภาพ (.png)

            </div>
        </header>

        <div class="mb-10 no-print max-w-2xl mx-auto" id="search-section">

                <svg class="w-6 h-6 absolute left-5 top-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div id="welfareContainer">
            <div class="mb-16">
                <div class="flex items-center mb-8 border-b-2 border-yellow-400 pb-2">
                    <span class="text-4xl mr-3">🏛️</span>
                    <h2 class="text-3xl font-bold text-gray-800">สวัสดิการมหาวิทยาลัยธรรมศาสตร์ (ส่วนกลาง)</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="tuWelfare"></div>
            </div>

            <div class="mb-16">
                <div class="flex items-center mb-8 border-b-2 border-red-600 pb-2">
                    <span class="text-4xl mr-3">📰</span>
                    <h2 class="text-3xl font-bold text-gray-800">สวัสดิการคณะวารสารศาสตร์และสื่อสารมวลชน</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="jcWelfare"></div>
            </div>
        </div>

        <footer class="text-center text-gray-400 text-sm mt-20 border-t pt-8 pb-8">
            *รายละเอียดเป็นไปตามระเบียบและประกาศของมหาวิทยาลัยและคณะฯ*
        </footer>
    </div>

    <script>

            { title: "จัดกระเช้าเยี่ยมผู้ป่วย", detail: "กรณีเป็นคนไข้ในของโรงพยาบาลรัฐและเอกชน", conditions: ["ต้องพักรักษาตัวไม่น้อยกว่า 3 วัน"], amount: "700.-", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "สวัสดิการช่วยเหลือค่าดอกเบี้ยที่อยู่อาศัย", detail: "โครงการช่วยเหลือค่าดอกเบี้ยเงินกู้", conditions: ["ปฏิบัติงานไม่น้อยกว่า 1 ปี นับจากวันทำสัญญา", "กู้เงินไม่น้อยกว่า 2 แสนบาทจากสถาบันการเงิน"], amount: "450 บาท/เดือน (นาน 120 เดือน)", contact: "งานสวัสดิการและสิทธิประโยชน์ มธ." },

            { title: "เงินอุดหนุนการศึกษาบุตร", detail: "ช่วยเหลือค่าเล่าเรียนบุตร", conditions: ["ปฏิบัติงานไม่น้อยกว่า 1 ปี", "ศึกษาตั้งแต่ชั้นอนุบาล ถึง ม.6 หรือ ปวช. 1-3"], amount: "อนุบาล-ป.6: 1,500.-/ปี | ม.1-ม.6/ปวช.: 2,000.-/ปี", contact: "งานคลังและพัสดุ คณะวารสารศาสตร์ฯ" },
            { title: "ประกันชีวิต อุบัติเหตุ และสุขภาพ (กลุ่ม)", detail: "กรมธรรม์ประกันภัยกลุ่มพนักงาน", conditions: ["พนักงานมหาวิทยาลัยผู้มีสิทธิ"], amount: "ตามเงื่อนไขกรมธรรม์", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "เงินช่วยเหลือค่าทำศพ", detail: "กรณีถึงแก่กรรม (ตนเองและครอบครัว)", conditions: ["1. พนักงานถึงแก่กรรม", "2. บิดา มารดา คู่สมรสที่ชอบด้วยกฎหมาย", "3. บุตรที่ชอบด้วยกฎหมาย (ไม่รวมบุตรบุญธรรม)"], amount: "5,000.-", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "ค่าพวงหรีดเคารพศพ", detail: "กรณีบุคคลในครอบครัวถึงแก่กรรม", conditions: ["1. พนักงานถึงแก่กรรม", "2. บิดา มารดา คู่สมรสที่ชอบด้วยกฎหมาย", "3. บุตรที่ชอบด้วยกฎหมาย"], amount: "ไม่เกิน 700.-", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "เงินค่าหนังสือและเอกสารวิชาการ", detail: "สนับสนุนการพัฒนาวิชาการ", conditions: ["ปฏิบัติงานระหว่างปีงบประมาณไม่น้อยกว่า 6 เดือน"], amount: "2,000.- บาท/ปี", contact: "หมวดบริหารงานบุคคล คณะฯ ดำเนินการเบิกจ่ายให้" },
            { title: "กองทุนสำรองเลี้ยงชีพ (TU)", detail: "เงินสะสมและเงินสมทบเพื่อการเกษียณ", conditions: ["อายุสมาชิก 1 ปี < 2 ปี: มธ. สมทบ 5%", "อายุสมาชิก 2 ปี < 5 ปี: มธ. สมทบ 6%", "อายุสมาชิก 5 ปี ขึ้นไป: มธ. สมทบ 7%"], amount: "สมาชิกสะสมเพิ่มได้ 3-15%", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" }
        ];

        const jcData = [
            { title: "ค่าใช้จ่ายเพิ่มพูนความรู้ทางวิชาการ", detail: "ค่าธรรมเนียมสัมมนา/หนังสือ/วัสดุคอมพิวเตอร์/สมาชิกวารสาร", conditions: ["1 ปี < 2 ปี: ไม่เกิน 3,000.- /ปี", "2 ปี < 3 ปี: ไม่เกิน 6,000.- /ปี", "3 ปี ขึ้นไป: ไม่เกิน 10,000.- /ปี", "สะสมได้ไม่เกิน 2 หมื่น (2 ปีงบประมาณติดต่อกัน)"], amount: "3,000 - 10,000.-", contact: "งานคลังและพัสดุ คณะวารสารศาสตร์ฯ" },
            { title: "สวัสดิการด้านสุขภาพ (JC)", detail: "สวัสดิการสุขภาพแบบยืดหยุ่น", conditions: ["แบบยืดหยุ่น: ได้รับเมื่อปฏิบัติงานครบ 180 วัน"], amount: "วงเงิน 15,000 บาท/ปี สะสมได้ไม่เกิน 30,000 บาท/ปี", contact: "งานคลังและพัสดุ คณะวารสารศาสตร์ฯ" },
            { title: "เงินสมทบการสอน (อาจารย์ประจำ)", detail: "สำหรับอาจารย์ประจำผู้รับผิดชอบรายวิชา", conditions: ["ปฏิบัติงานในคณะติดต่อกันไม่น้อยกว่า 1 ปี", "สอนระดับ ป.ตรี ภาคปกติ ไม่น้อยกว่า 3 รายวิชา/ปี", "ไม่มีบุคคลภายนอกสอนเกิน 9 ชม.", "เบิกได้ไม่เกิน 4 รายวิชา หรือไม่เกิน 20,000.- ต่อปีการศึกษา"], amount: "วิชาละ 5,000.- (สูงสุด 20,000.-/ปี)", contact: "งานคลังและพัสดุ คณะวารสารศาสตร์ฯ" },
            { title: "จัดซื้อสิ่งของเยี่ยมผู้ป่วย (คณะ)", detail: "สิทธิสำหรับบุคลากรและครอบครัว", conditions: ["เป็นคนไข้ใน รพ. รัฐหรือเอกชน", "ตนเอง/บิดามารดา/คู่สมรส/บุตรชอบด้วยกฎหมาย", "ห่างจากการรักษาครั้งก่อนอย่างน้อย 15 วัน"], amount: "ตามจริงไม่เกิน 1,000.-", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "เงินช่วยเหลือค่าจัดงานศพ", detail: "ช่วยเหลือค่าจัดงานหรือร่วมเป็นเจ้าภาพ", conditions: ["บุคลากร/บิดา/มารดา/คู่สมรส/บุตร (ไม่รวมบุตรบุญธรรม)"], amount: "รายละ 10,000.-", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "เงินช่วยเหลือค่าพวงหรีด (คณะ)", detail: "สำหรับบุคลากรและครอบครัว", conditions: ["บุคลากร/บิดา/มารดา/คู่สมรส/บุตร (ไม่รวมบุตรบุญธรรม)"], amount: "ตามจริงไม่เกิน 1,000.-", contact: "หมวดบริหารงานบุคคล คณะวารสารศาสตร์ฯ" },
            { title: "พัสดุและอุปกรณ์สำนักงาน", detail: "การเบิกอุปกรณ์และกระดาษ", conditions: ["กระดาษ A4: ภาคการศึกษาละ 1 รีม", "อุปกรณ์สำนักงานอื่นๆ ตามความจำเป็น"], amount: "-", contact: "หมวดบริหารงานพัสดุ คณะวารสารศาสตร์ฯ" }
        ];

        function createCard(item, accentClass) {
            const conditionsHtml = item.conditions.map(c => `<li>${c}</li>`).join('');
            return `
                <div class="welfare-card bg-white rounded-3xl overflow-hidden shadow-sm flex flex-col h-full border border-gray-100">
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.title}</h3>
                        </div>
                        <p class="text-sm font-semibold text-gray-500 mb-3">${item.detail}</p>
                        <div class="bg-gray-50 rounded-2xl p-4 mb-4">
                            <span class="text-xs font-bold text-gray-400 uppercase block mb-2">เงื่อนไข / รายละเอียด:</span>
                            <ul class="condition-list text-sm text-gray-700 space-y-1 ml-4">
                                ${conditionsHtml}
                            </ul>
                        </div>
                    </div>
                    
                    <div class="px-6 py-4 ${accentClass} bg-opacity-10 border-t border-gray-100 mt-auto flex flex-col">
                        <div class="flex justify-between items-start gap-4 min-h-[4.5rem]">
                            <span class="text-xs font-bold text-gray-500 uppercase shrink-0 pt-1">จำนวนเงิน</span>
                            <span class="text-md font-bold text-red-700 text-right">${item.amount}</span>
                        </div>
                        
                        <div class="flex flex-col border-t border-gray-200 pt-3 mt-auto">
                            <span class="text-xs font-bold text-gray-400 uppercase mb-1">การติดต่อ</span>
                            <span class="text-xs font-semibold text-gray-600">${item.contact}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            const tuContainer = document.getElementById('tuWelfare');
            const jcContainer = document.getElementById('jcWelfare');
            
            tuContainer.innerHTML = tuData.map(item => createCard(item, 'bg-yellow-400')).join('');
            jcContainer.innerHTML = jcData.map(item => createCard(item, 'bg-red-600')).join('');
        }

        function filterWelfare() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.welfare-card');
            
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.closest('div').style.display = text.includes(input) ? '' : 'none';
            });
        }

        // ฟังก์ชันดาวน์โหลดเป็น Text File (เดิม)
        function downloadInfo() {
            let text = "สวัสดิการพนักงานมหาวิทยาลัยสายวิชาการ (ฉบับสมบูรณ์ - มี.ค. 69)\n";
            text += "========================================================\n\n";
            
            text += "1. สวัสดิการมหาวิทยาลัยธรรมศาสตร์ (ส่วนกลาง)\n";
            text += "------------------------------------------\n";
            tuData.forEach((item, i) => {
                text += `${i+1}. ${item.title}\n`;
                text += `   เงื่อนไข: ${item.conditions.join(' | ')}\n`;
                text += `   จำนวนเงิน: ${item.amount}\n`;
                text += `   ติดต่อ: ${item.contact}\n\n`;
            });

            text += "\n2. สวัสดิการคณะวารสารศาสตร์และสื่อสารมวลชน\n";
            text += "------------------------------------------\n";
            jcData.forEach((item, i) => {
                text += `${i+1}. ${item.title}\n`;
                text += `   เงื่อนไข: ${item.conditions.join(' | ')}\n`;
                text += `   จำนวนเงิน: ${item.amount}\n`;
                text += `   ติดต่อ: ${item.contact}\n\n`;
            });

            const blob = new Blob([text], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "full_welfare_summary_2026.txt";
            a.click();
            URL.revokeObjectURL(url);
        }

        // ฟังก์ชันใหม่! สำหรับดาวน์โหลดเป็นรูปภาพ (.png)
        function downloadAsImage() {
            // เลือกขอบเขตทั้งหมดที่ต้องการเซฟเป็นรูป
            const captureArea = document.getElementById('capture-area');
            
            // 1. ซ่อนปุ่มและช่องค้นหา (จะได้ไม่ติดเข้าไปในรูปภาพ)
            const actionButtons = document.getElementById('action-buttons');
            const searchSection = document.getElementById('search-section');
            actionButtons.style.display = 'none';
            searchSection.style.display = 'none';

            // 2. ปรับแต่งปุ่ม Card ให้ไม่มีเงาตอน Hover (กันภาพเบลอ) และให้พร้อมแคป
            const cards = document.querySelectorAll('.welfare-card');
            cards.forEach(card => card.style.transform = 'none');

            // 3. ใช้ html2canvas แปลง HTML เป็นรูปภาพ
            // ตั้งค่า scale: 2 เพื่อให้ภาพมีความคมชัดสูงขึ้นเวลาดาวน์โหลดไป
            html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: "#f1f5f9" }).then(canvas => {
                
                // 4. เอาปุ่มและช่องค้นหากลับมาแสดงตามปกติหลังจากแคปเสร็จแล้ว
                actionButtons.style.display = 'flex';
                searchSection.style.display = 'block';

                // 5. สร้างลิงก์ดาวน์โหลดและคลิกอัตโนมัติ
                const link = document.createElement('a');
                link.download = 'welfare_summary_image_2026.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        window.onload = renderAll;
    </script>
</body>
</html>
